name: Daily BEES Fetcher

on:
  schedule:
    # 4:00 AM UTC is exactly 9:30 AM IST
    - cron: '0 4 * * 1-5'
  workflow_dispatch: # This line enables the manual run button!
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rc_stocksbot1.py
